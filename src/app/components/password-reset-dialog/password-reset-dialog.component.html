<h2 mat-dialog-title>Reset Password</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="password-reset-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>New Password</mat-label>
      <input matInput type="password" formControlName="password" required />
      <mat-error *ngIf="form.get('password')?.hasError('required')">Password is required</mat-error>
      <mat-error *ngIf="form.get('password')?.hasError('minlength')">Password must be at least 8 characters</mat-error>
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Confirm Password</mat-label>
      <input matInput type="password" formControlName="confirmPassword" required />
      <mat-error *ngIf="form.get('confirmPassword')?.hasError('required')">Confirmation is required</mat-error>
      <mat-error *ngIf="form.hasError('passwordMismatch')">Passwords do not match</mat-error>
    </mat-form-field>
    <mat-error *ngIf="error">{{ error }}</mat-error>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="dialogRef.close()">Cancel</button>
  <button mat-flat-button color="primary" (click)="onSubmit()" [disabled]="form.invalid || isLoading">
    Update Password
  </button>
</mat-dialog-actions>
