<h2 mat-dialog-title>Session Expired</h2>
<mat-dialog-content>
  <p>Your session has expired due to 30 minutes of inactivity. Please log in again.</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-flat-button color="primary" (click)="confirm()">OK</button>
</mat-dialog-actions>
