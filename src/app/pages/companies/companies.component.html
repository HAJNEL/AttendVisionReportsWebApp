<div class="companies-container">
  <div class="page-header">
    <h1>Companies</h1>
    <button mat-flat-button color="primary" (click)="openCreate()" [disabled]="loading" class="create-btn desktop-only">
      <mat-icon>add</mat-icon>
      Create Company
    </button>
    <button mat-fab color="primary" (click)="openCreate()" [disabled]="loading" class="create-fab mobile-only" aria-label="Create Company">
      <mat-icon>add</mat-icon>
    </button>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="center-spinner">
    <mat-spinner diameter="48"></mat-spinner>
  </div>

  <!-- Error -->
  <div *ngIf="!loading && error" class="error-banner">
    <mat-icon>error_outline</mat-icon>
    <span>{{ error }}</span>
    <button mat-button (click)="load()">Retry</button>
  </div>

  <!-- Table -->
  <mat-card class="table-card" *ngIf="!loading && !error">
    <table mat-table [dataSource]="companies" class="mat-elevation-z0">

      <!-- Company Name -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Company Name</th>
        <td mat-cell *matCellDef="let company">
          <span class="company-name">{{ company.name }}</span>
        </td>
      </ng-container>

      <!-- Description -->
      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Description</th>
        <td mat-cell *matCellDef="let company">{{ company.description || '\u2014' }}</td>
      </ng-container>

      <!-- Actions -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let company" class="actions-cell">
          <button mat-icon-button [matMenuTriggerFor]="rowMenu" [matMenuTriggerData]="{ company: company }"
                  aria-label="Row actions">
            <mat-icon>more_vert</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <!-- Empty state -->
      <tr class="mat-row" *matNoDataRow>
        <td class="no-data-cell" [attr.colspan]="displayedColumns.length">
          No companies found. Click <em>Create Company</em> to add one.
        </td>
      </tr>
    </table>
  </mat-card>

  <!-- Shared row-actions menu -->
  <mat-menu #rowMenu="matMenu">
    <ng-template matMenuContent let-company="company">
      <button mat-menu-item (click)="openEdit(company)">
        <mat-icon>edit</mat-icon>
        <span>Edit</span>
      </button>
        <button mat-menu-item class="delete-item" (click)="confirmDelete(company)">
        <mat-icon>delete</mat-icon>
        <span>Delete</span>
      </button>
    </ng-template>
  </mat-menu>
</div>
