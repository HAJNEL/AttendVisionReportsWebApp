<h2 mat-dialog-title>{{ data.role ? 'Edit Role' : 'Create Role' }}</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="role-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Role Name</mat-label>
      <input matInput formControlName="name" required />
      <mat-error *ngIf="form.get('name')?.hasError('required')">Required</mat-error>
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description" rows="3"></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-flat-button color="primary" (click)="onSubmit()" [disabled]="form.invalid">
    {{ data.role ? 'Save' : 'Create' }}
  </button>
</mat-dialog-actions>
