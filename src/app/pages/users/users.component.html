<div class="users-container">
  <div class="page-header">
    <h1>Users</h1>
    <button mat-flat-button color="primary" (click)="openCreateUser()" [disabled]="loading">
      <mat-icon>add</mat-icon>
      Create User
    </button>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="center-spinner">
    <mat-spinner diameter="48"></mat-spinner>
  </div>

  <!-- Error -->
  <div *ngIf="!loading && error" class="error-banner">
    <mat-icon>error_outline</mat-icon>
    <span>{{ error }}</span>
    <button mat-button (click)="load()">Retry</button>
  </div>

  <!-- Table -->
  <mat-card class="table-card" *ngIf="!loading && !error">
    <table mat-table [dataSource]="users" class="mat-elevation-z0">

      <!-- Username -->
      <ng-container matColumnDef="fullname">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let user">
          <span class="user-name">{{ user.firstName ? `${user.firstName} ${user.lastName ?? ''}`.trim() : user.email }}</span>
        </td>
      </ng-container>

      <!-- Email -->
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let user">{{ user.email }}</td>
      </ng-container>

      <!-- Roles -->
      <ng-container matColumnDef="roles">
        <th mat-header-cell *matHeaderCellDef>Roles</th>
        <td mat-cell *matCellDef="let user">{{ getRoleNames(user) }}</td>
      </ng-container>

      <!-- Actions -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="actions-header-cell"></th>
        <td mat-cell *matCellDef="let user" class="actions-cell">
          <button mat-icon-button [matMenuTriggerFor]="rowMenu" [matMenuTriggerData]="{ user: user }"
                  aria-label="Row actions">
            <mat-icon>more_vert</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <!-- Empty state -->
      <tr class="mat-row" *matNoDataRow>
        <td class="no-data-cell" [attr.colspan]="displayedColumns.length">
          No users found. Click <em>Create User</em> to add one.
        </td>
      </tr>
    </table>

    <!-- Shared row-actions menu -->
    <mat-menu #rowMenu="matMenu">
      <ng-template matMenuContent let-user="user">
        <button mat-menu-item (click)="openEditUser(user)">
          <mat-icon>edit</mat-icon>
          <span>Edit</span>
        </button>
        <button mat-menu-item (click)="openAssignRoles(user)">
          <mat-icon>manage_accounts</mat-icon>
          <span>Assign Roles</span>
        </button>
        <button mat-menu-item (click)="openAssignDepartments(user)">
          <mat-icon>account_tree</mat-icon>
          <span>Assign Departments</span>
        </button>
        <button mat-menu-item class="delete-item" (click)="confirmDeleteUser(user)">
          <mat-icon>delete</mat-icon>
          <span>Delete</span>
        </button>
      </ng-template>
    </mat-menu>
  </mat-card>
</div>
