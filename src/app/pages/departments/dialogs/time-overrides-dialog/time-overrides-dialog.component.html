<h2 mat-dialog-title>Time Overrides for {{ data.departmentName }}</h2>
<mat-dialog-content>
  <div *ngIf="loading" class="center-spinner">
    <mat-spinner diameter="32"></mat-spinner>
  </div>
  <div *ngIf="error" class="error-banner">
    <mat-icon>error_outline</mat-icon>
    <span>{{ error }}</span>
  </div>
  <div *ngIf="!loading">
    <table mat-table [dataSource]="overrides" class="mat-elevation-z0" *ngIf="overrides.length">
      <ng-container matColumnDef="fromTime">
        <th mat-header-cell *matHeaderCellDef>From</th>
        <td mat-cell *matCellDef="let o">{{ o.fromTime }}</td>
      </ng-container>
      <ng-container matColumnDef="toTime">
        <th mat-header-cell *matHeaderCellDef>To</th>
        <td mat-cell *matCellDef="let o">{{ o.toTime }}</td>
      </ng-container>
      <ng-container matColumnDef="overrideTime">
        <th mat-header-cell *matHeaderCellDef>Override</th>
        <td mat-cell *matCellDef="let o">{{ o.overrideTime }}</td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let o">
          <button mat-icon-button (click)="startEdit(o)" aria-label="Edit"><mat-icon>edit</mat-icon></button>
          <button mat-icon-button color="warn" (click)="delete(o)" aria-label="Delete"><mat-icon>delete</mat-icon></button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="['fromTime','toTime','overrideTime','actions']"></tr>
      <tr mat-row *matRowDef="let row; columns: ['fromTime','toTime','overrideTime','actions']"></tr>
    </table>
    <div *ngIf="!overrides.length" class="muted">No time overrides found.</div>
    <form [formGroup]="form" (ngSubmit)="save()" class="override-form">
      <div class="row-fields">
        <mat-form-field appearance="outline" class="half-width">
          <mat-label>From Time</mat-label>
          <input matInput type="time" formControlName="fromTime">
        </mat-form-field>
        <mat-form-field appearance="outline" class="half-width">
          <mat-label>To Time</mat-label>
          <input matInput type="time" formControlName="toTime">
        </mat-form-field>
        <mat-form-field appearance="outline" class="half-width">
          <mat-label>Override Time</mat-label>
          <input matInput type="time" formControlName="overrideTime">
        </mat-form-field>
      </div>
      <div class="row-fields">
        <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid" class="half-width">
          {{ editing ? 'Save' : 'Add' }} Override
        </button>
        <button mat-button type="button" (click)="form.reset(); editing = null;" *ngIf="editing" class="half-width">Cancel</button>
      </div>
    </form>
  </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="close()">Close</button>
</mat-dialog-actions>
